<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
<style>
    .bg { fill: #111315; }
    .panel { fill: #191c20; stroke: #5f6b7a; stroke-width: 1.5; }
    .panel2 { fill: #1f242a; stroke: #5f6b7a; stroke-width: 1.5; }
    .grid { stroke: #2c333b; stroke-width: 1; }
