<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1920" height="1200" viewBox="0 0 1920 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1920" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#7C8AA5" flood-opacity="0.16"/>
    </filter>

    <style>
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #172033; letter-spacing: 0.2px; }
      .subtitle { font: 500 14px Inter, Arial, sans-serif; fill: #5B6985; }
      .section { font: 700 18px Inter, Arial, sans-serif; fill: #172033; letter-spacing: 0.2px; }
      .small { font: 500 12px Inter, Arial, sans-serif; fill: #62708A; }
      .tiny { font: 500 11px Inter, Arial, sans-serif; fill: #76839B; }
      .label { font: 600 12px Inter, Arial, sans-serif; fill: #1E293B; text-anchor: middle; dominant-baseline: middle; }
      .axis { font: 500 11px Inter, Arial, sans-serif; fill: #71819B; text-anchor: end; dominant-baseline: middle; }

      .panelBase { fill: #FFFFFF; stroke: #D7E1F1; stroke-width: 1.5; rx: 22; }
      .softPanel { fill: #F8FBFF; stroke: #D7E1F1; stroke-width: 1.3; rx: 18; }
      .canvas { fill: #FFFFFF; stroke: #CBD7EA; stroke-width: 1.8; rx: 28; }

      .seg { fill: #F6F9FF; stroke: #CBD7EA; stroke-width: 1.4; rx: 14; }
      .segOn { fill: #FFFFFF; stroke: #94A3B8; stroke-width: 1.4; rx: 12; }
      .btn { fill: #F6F9FF; stroke: #CBD7EA; stroke-width: 1.4; rx: 12; }
      .btnStrong { fill: #FFFFFF; stroke: #94A3B8; stroke-width: 1.4; rx: 12; }
      .track { fill: #EAF1FB; stroke: #CBD7EA; stroke-width: 1.2; rx: 8; }
      .thumb { fill: #FFFFFF; stroke: #7C8AA5; stroke-width: 1.8; }

      .line { stroke: #E5ECF7; stroke-width: 1.15; }
      .grid { stroke: #E7EEF9; stroke-width: 1; }

      .icon { stroke: #1E293B; stroke-width: 2.1; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .iconFill { fill: #1E293B; }

      .lane1 { stroke: #1F2937; stroke-width: 4.5; fill: none; stroke-linecap: round; }
      .lane2 { stroke: #8B5CF6; stroke-width: 4.2; fill: none; stroke-linecap: round; }
      .lane3 { stroke: #14B8A6; stroke-width: 4.2; fill: none; stroke-linecap: round; }

      .noteOff { fill: #FFFFFF; stroke: #A9BAD5; stroke-width: 1.8; }
      .noteOn { fill: #DCFCE7; stroke: #22C55E; stroke-width: 1.8; }
      .noteRoot { fill: #FEF3C7; stroke: #F59E0B; stroke-width: 2; }
      .noteRootRing { fill: none; stroke: #FBBF24; stroke-width: 2; }

      .transportAccent { fill: #F4E8FF; stroke: #C4B5FD; stroke-width: 1.2; rx: 999; }
      .transportEdge { stroke: #8B5CF6; stroke-width: 2.2; }
      .transportBg { fill: #FBF7FF; stroke: #E6D7FF; stroke-width: 1.4; rx: 22; }

      .curveAccent { fill: #E0F2FE; stroke: #7DD3FC; stroke-width: 1.2; rx: 999; }
      .curveBg { fill: #F7FCFF; stroke: #D6EEF9; stroke-width: 1.4; rx: 22; }

      .shapeAccent { fill: #FEF3C7; stroke: #FCD34D; stroke-width: 1.2; rx: 999; }
      .shapeBg { fill: #FFFCF2; stroke: #F8E7A8; stroke-width: 1.4; rx: 22; }

      .matrixAccent { fill: #DCFCE7; stroke: #86EFAC; stroke-width: 1.2; rx: 999; }
      .matrixBg { fill: #F6FFF8; stroke: #D3F2DD; stroke-width: 1.4; rx: 22; }

      .notesAccent { fill: #FCE7F3; stroke: #F9A8D4; stroke-width: 1.2; rx: 999; }

      .statePill { fill: #F4E8FF; stroke: #8B5CF6; stroke-width: 1.2; rx: 999; }
      .mappingPill { fill: #DCFCE7; stroke: #22C55E; stroke-width: 1.2; rx: 999; }
      .sessionPill { fill: #E0F2FE; stroke: #38BDF8; stroke-width: 1.2; rx: 999; }
    </style>
