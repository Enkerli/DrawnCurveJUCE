<svg xmlns="http://www.w3.org/2000/svg" width="2920" height="2088" viewBox="0 0 2920 2088">
<style>
    .bg { fill: #111315; }
    .panel { fill: #191c20; stroke: #5f6b7a; stroke-width: 1.5; }
    .panel2 { fill: #1f242a; stroke: #5f6b7a; stroke-width: 1.5; }
